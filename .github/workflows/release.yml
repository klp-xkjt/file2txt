name: Release

on:
  push:
    tags:
      - "v*"  # 只有tags触发，不包含branches

permissions:
  contents: write

env:
  CRATE_NAME: file2txt
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: 构建 ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: file2txt-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: file2txt-macos-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: file2txt-windows-x86_64.exe
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: ⚡ 缓存 cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 构建 Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: 准备产物
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            SRC="target/${{ matrix.target }}/release/${{ env.CRATE_NAME }}.exe"
          else
            SRC="target/${{ matrix.target }}/release/${{ env.CRATE_NAME }}"
          fi
          cp "$SRC" "${{ matrix.asset_name }}"
          echo "✅ 产物已准备: ${{ matrix.asset_name }}"

      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}